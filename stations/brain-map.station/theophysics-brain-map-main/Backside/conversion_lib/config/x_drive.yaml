deployment_name: x_drive
export_root: X:\EXPORTS\conversion-layer
state_root: X:\Backside\_state\conversion-layer

markitdown:
  enabled: true
  use_llm_for_image_descriptions: false

youtube:
  prefer_transcript: true
  yt_dlp_format: bestaudio/best
  cache_dir: X:\Pipeline\captures\youtube_cache

whisper:
  enabled: false
  model_size: base
  model_dir: D:\brain\01_WHISPER\_MODELS

ocr:
  enabled: false
  tesseract_path: C:\Program Files\Tesseract-OCR\tesseract.exe

tts:
  enabled: false
  repo_path: \\dlowenas\github\TTS
  default_voice: default
  output_dir: X:\Pipeline\captures\tts_out

