<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Treaties{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a22;
      --panel-2: #1d2230;
      --fg: #e7ecf3;
      --muted: #8a93a6;
      --accent: #6ee7b7;
      --accent-2: #93c5fd;
      --warn: #fbbf24;
      --bad: #fb7185;
      --border: #262c3a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
    }
    a { color: var(--accent-2); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    header h1 { margin: 0; font-size: 24px; letter-spacing: 0.02em; }
    header nav { color: var(--muted); font-size: 14px; }
    .top-paper {
      min-width: 240px;
      flex: 1;
      display: grid;
      gap: 2px;
    }
    .top-paper-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--fg);
      overflow-wrap: anywhere;
    }
    .top-paper-file {
      font-size: 12px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      overflow-wrap: anywhere;
    }
    main { padding: 24px; max-width: 1180px; margin: 0 auto; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .panel h2 { margin-top: 0; font-size: 16px; }
    .muted { color: var(--muted); }
    .grid { display: grid; gap: 12px; }
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .detail-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 16px;
      align-items: start;
    }
    .metadata-list { display: grid; gap: 8px; font-size: 13px; }
    .metadata-row { display: grid; gap: 2px; }
    .metadata-row span {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .metadata-row code { overflow-wrap: anywhere; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 600; }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      background: var(--panel-2);
      color: var(--fg);
      border: 1px solid var(--border);
      margin: 0 4px 4px 0;
    }
    .score-bar {
      height: 8px;
      background: var(--panel-2);
      border-radius: 4px;
      overflow: hidden;
    }
    .score-bar > span {
      display: block;
      height: 100%;
      background: var(--accent);
    }
    .score-bar.bad > span { background: var(--bad); }
    button, input[type=submit] {
      background: var(--accent-2);
      color: #0b0e14;
      border: 0;
      padding: 6px 12px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }
    input[type=text], input[type=number], textarea, select {
      background: var(--panel-2);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      width: 100%;
      font-family: inherit;
    }
    textarea { min-height: 120px; }
    code { background: var(--panel-2); padding: 1px 5px; border-radius: 4px; font-size: 13px; }
    blockquote {
      margin: 6px 0;
      padding: 8px 12px;
      border-left: 3px solid var(--accent);
      color: var(--muted);
      background: var(--panel-2);
      border-radius: 0 6px 6px 0;
    }
    @media (max-width: 820px) {
      .grid-2, .detail-layout { grid-template-columns: 1fr; }
      header { align-items: flex-start; }
    }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <header>
    <h1><a href="/">Theophysics</a></h1>
    <div class="top-paper">
      <div class="top-paper-title">{% block top_paper_title %}Treaties Pipeline{% endblock %}</div>
      <div class="top-paper-file">{% block top_paper_file %}exports/html + exports/json{% endblock %}</div>
    </div>
    <nav>
      <a href="/">Home</a> &middot;
      <a href="/docs">API</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
