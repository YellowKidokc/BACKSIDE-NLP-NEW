<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analyzing — {{ meta.title or paper_id }}</title>
<style>
  :root {
    --bg:        #0b0b0d;
    --surface:   #15151a;
    --surface-2: #1c1c22;
    --border:    #2a2a32;
    --text:      #e8e8e8;
    --muted:     #9a9aa3;
    --gold:      #d4af37;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: radial-gradient(1200px 600px at 50% -10%, #1b1b22 0%, var(--bg) 60%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    width: min(620px, 100%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px;
    text-align: center;
  }
  h1 { color: var(--gold); margin: 0 0 6px; font-weight: 600; font-size: 1.4rem; }
  .meta { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }
  .meta strong { color: var(--text); font-weight: 500; }

  .spinner {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 3px solid #2a2a32;
    border-top-color: var(--gold);
    animation: spin 1s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .state {
    display: inline-block;
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .hint {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 18px;
    line-height: 1.5;
  }
  a.btn {
    display: inline-block;
    margin-top: 18px;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 8px 16px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 0.85rem;
  }
  a.btn:hover { background: rgba(212,175,55,0.08); }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
</style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <span class="state" id="state-pill">{{ state | upper }}</span>
    <h1>Running the 12-layer pipeline</h1>
    <p class="meta">
      <strong>{{ meta.title or paper_id }}</strong><br>
      {{ meta.author or "" }} &middot; {{ meta.domain or "" }}
    </p>
    <p class="hint">
      This typically takes 30–120 seconds. The page reloads itself when the
      report is ready.
    </p>
    <p class="mono" style="color: var(--muted); font-size: 0.75rem; margin-top: 18px;">
      paper_id: {{ paper_id }}
    </p>
    <a class="btn" href="/raw/{{ paper_id }}">View source markdown</a>
  </div>

  <script>
    const id = {{ paper_id | tojson }};
    const pill = document.getElementById("state-pill");
    async function poll() {
      try {
        const r = await fetch(`/status/${id}`, { cache: "no-store" });
        if (!r.ok) return;
        const j = await r.json();
        if (j.status) pill.textContent = j.status.toUpperCase();
        if (j.status === "complete" || j.status === "error") {
          window.location.reload();
        }
      } catch (e) { /* swallow & retry */ }
    }
    setInterval(poll, 2500);
    poll();
  </script>
</body>
</html>
