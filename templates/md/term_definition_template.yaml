# ═══════════════════════════════════════════════════════════════
# THEOPHYSICS TERM DEFINITION SCHEMA v1.0
# ═══════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────
# CORE IDENTITY
# ─────────────────────────────────────────────────────────────────
uuid: "{{UUID}}" # Primary anchor - NEVER omit
term: "{{TERM}}" # Canonical name
aliases: # Synonyms, alternate spellings, abbreviations
  - "{{ALIAS_1}}"
  - "{{ALIAS_2}}"
near_terms: # Often confused with / adjacent to
  - term: "{{NEAR_TERM}}"
    distinction: "{{HOW_DIFFERENT}}"

# ─────────────────────────────────────────────────────────────────
# DOMAIN TAGS
# ─────────────────────────────────────────────────────────────────
domains:
  primary: "{{physics|theology|philosophy|consciousness|mathematics}}"
  secondary:
    - "{{DOMAIN_2}}"
    - "{{DOMAIN_3}}"

# ─────────────────────────────────────────────────────────────────
# DEFINITIONS
# ─────────────────────────────────────────────────────────────────
definitions:
  theophysics: # OUR definition - authoritative for the project
    formal: "{{PRECISE_TECHNICAL_DEFINITION}}"
    plain: "{{WHAT_IT_MEANS_IN_PLAIN_ENGLISH}}"
    one_line: "{{ELEVATOR_PITCH_VERSION}}"

  standard: # External consensus definitions
    physics: "{{STANDARD_PHYSICS_DEFINITION}}"
    philosophy: "{{STANDARD_PHILOSOPHY_DEFINITION}}"
    theology: "{{STANDARD_THEOLOGY_DEFINITION}}"
    mathematics: "{{STANDARD_MATH_DEFINITION}}"

  divergence_note: "{{WHERE_OUR_DEFINITION_DIFFERS_AND_WHY}}"

# ─────────────────────────────────────────────────────────────────
# MATHEMATICAL FORMALIZATION (if applicable)
# ─────────────────────────────────────────────────────────────────
formalization:
  symbol: "{{SYMBOL}}" # e.g., χ, Ψ, Λ
  latex: "{{LATEX_EXPRESSION}}"
  appears_in:
    - equation: "Master Equation"
      role: "{{WHAT_IT_REPRESENTS_THERE}}"
    - equation: "{{OTHER_EQUATION}}"
      role: "{{ROLE}}"

# ─────────────────────────────────────────────────────────────────
# CROSS-DOMAIN MAPPING (The Theophysics Bridge)
# ─────────────────────────────────────────────────────────────────
cross_domain:
  physics:
    manifestation: "{{HOW_IT_APPEARS_IN_PHYSICS}}"
    examples: ["{{EXAMPLE_1}}", "{{EXAMPLE_2}}"]

  theology:
    manifestation: "{{HOW_IT_APPEARS_IN_THEOLOGY}}"
    scriptural_anchor: "{{VERSE_OR_CONCEPT}}"

  philosophy:
    manifestation: "{{HOW_IT_APPEARS_IN_PHILOSOPHY}}"
    tradition: "{{WHICH_SCHOOL_OF_THOUGHT}}"

  consciousness:
    manifestation: "{{HOW_IT_APPEARS_IN_CONSCIOUSNESS_STUDIES}}"
    experiential: "{{WHAT_IT_FEELS_LIKE_FROM_INSIDE}}"

# ─────────────────────────────────────────────────────────────────
# THEOPHYSICS INTEGRATION
# ─────────────────────────────────────────────────────────────────
integration:
  papers: # Which Logos Papers use this term
    - paper: "P1"
      section: "{{SECTION}}"
      usage: "{{HOW_USED}}"

  axioms: # Connected axioms (by UUID)
    - uuid: "{{AXIOM_UUID}}"
      relationship: "{{DEFINES|DEPENDS_ON|CONSTRAINS}}"

  laws: # Which of the 10 Laws
    - law: "Law I"
      connection: "{{HOW_CONNECTED}}"

  theorems: # Derived theorems using this term
    - uuid: "{{THEOREM_UUID}}"
      role: "{{PREMISE|CONCLUSION|VARIABLE}}"

# ─────────────────────────────────────────────────────────────────
# ANALOGIES & INTUITION PUMPS
# ─────────────────────────────────────────────────────────────────
analogies:
  primary:
    analogy: "{{BEST_ANALOGY}}"
    mapping: "{{WHAT_MAPS_TO_WHAT}}"
    breaks_when: "{{WHERE_ANALOGY_FAILS}}"

  secondary:
    - "{{ALTERNATIVE_ANALOGY_1}}"
    - "{{ALTERNATIVE_ANALOGY_2}}"

# ─────────────────────────────────────────────────────────────────
# EXTERNAL SOURCES
# ─────────────────────────────────────────────────────────────────
sources:
  wikipedia:
    url: "{{WIKIPEDIA_URL}}"
    summary: "{{KEY_POINTS}}"

  sep: # Stanford Encyclopedia of Philosophy
    url: "{{SEP_URL}}"
    summary: "{{KEY_POINTS}}"

  philpapers:
    url: "{{PHILPAPERS_URL}}"
    key_papers: ["{{PAPER_1}}", "{{PAPER_2}}"]

  scholarpedia:
    url: "{{SCHOLARPEDIA_URL}}"
    summary: "{{KEY_POINTS}}"

  arxiv: # For physics-heavy terms
    key_papers:
      - arxiv_id: "{{ARXIV_ID}}"
        title: "{{TITLE}}"
        relevance: "{{WHY_RELEVANT}}"

# ─────────────────────────────────────────────────────────────────
# PROVENANCE & HISTORY
# ─────────────────────────────────────────────────────────────────
provenance:
  origin: "{{WHO_COINED_IT_AND_WHEN}}"
  etymology: "{{WORD_ROOTS}}"
  evolution:
    - period: "{{ERA}}"
      meaning: "{{WHAT_IT_MEANT_THEN}}"
  key_thinkers:
    - name: "{{THINKER}}"
      contribution: "{{WHAT_THEY_ADDED}}"

# ─────────────────────────────────────────────────────────────────
# METADATA
# ─────────────────────────────────────────────────────────────────
meta:
  created: "{{DATE}}"
  last_updated: "{{DATE}}"
  status: "{{draft|review|canonical}}"
  confidence: "{{high|medium|low}}"
  needs_work: ["{{SECTION_1}}", "{{SECTION_2}}"]
  related_terms: # Other term UUIDs
    - "{{RELATED_UUID_1}}"
    - "{{RELATED_UUID_2}}"
