workflow_id: WF-HTML-001
name: HTML Article Refinery
input: html_article
status: draft

stations:
  # HTML -> Markdown
  - station_id: ST-CONV-012
    folder: BACKSIDE/STATIONS/stations/12_html_to_md
    in: source.html
    out: source.md

  # Markdown cleanup / normalization
  - station_id: ST-CONV-019
    folder: BACKSIDE/STATIONS/stations/19_md_cleaner
    in: source.md
    out: source.md

  # Frontmatter / metadata
  - station_id: ST-META-025
    folder: BACKSIDE/STATIONS/stations/25_frontmatter_builder
    in: source.md
    out: metadata.yml

  # Claim + structure extraction
  - station_id: ST-CLAIM-014
    folder: BACKSIDE/STATIONS/stations/14_claim_extractor
    in: source.md
    out:
      - claims.json
      - assumptions.json
      - equations.json
      - definitions.json

  # Lossless summary
  - station_id: ST-SUM-015
    folder: BACKSIDE/STATIONS/stations/15_lossless_summary
    in: source.md
    out: summary.lossless.md

  # 7Q forward / reverse / evidence
  - station_id: ST-7QS-009
    folder: BACKSIDE/STATIONS/stations/09_7q_forward
    in: source.md
    out: forward_7q.json

  - station_id: ST-7QS-010
    folder: BACKSIDE/STATIONS/stations/10_7q_reverse
    in: source.md
    out: reverse_7q.json

  - station_id: ST-7QS-011
    folder: BACKSIDE/STATIONS/stations/11_7q_evidence
    in: source.md
    out: evidence_7q.json

  # Evidence pressure (scaffolded)
  - station_id: ST-7QS-027
    folder: BACKSIDE/STATIONS/stations/27_evidence_pressure
    in: source.md
    out: evidence_pressure.json

  # Knowledge graph
  - station_id: ST-GRAPH-016
    folder: BACKSIDE/STATIONS/stations/16_knowledge_graph
    in:
      - metadata.yml
      - claims.json
      - summary.lossless.md
      - forward_7q.json
      - reverse_7q.json
      - evidence_7q.json
    out: graph.json

  # Publication gate
  - station_id: ST-PUB-017
    folder: BACKSIDE/STATIONS/stations/17_publication_gate
    in:
      - metadata.yml
      - summary.lossless.md
    out: publication_status.yml

  # Cross-output contradiction scan (scaffolded)
  - station_id: ST-RED-028
    folder: BACKSIDE/STATIONS/stations/28_cross_output_contradiction
    in:
      - claims.json
      - summary.lossless.md
      - forward_7q.json
      - reverse_7q.json
      - evidence_7q.json
      - graph.json
    out: contradiction_report.yml

