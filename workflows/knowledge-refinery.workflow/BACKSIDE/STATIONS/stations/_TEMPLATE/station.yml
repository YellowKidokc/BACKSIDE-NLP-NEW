# Station contract — copy from _TEMPLATE/
# Mirrors the shape of MODELS/_TEMPLATE/model.yml so stations and models read alike.
# new_station.py substitutes every {{PLACEHOLDER}} from CLI args.

station_id: {{STATION_ID}}              # e.g. ST-EMB-SCI-001
name: {{STATION_NAME}}                  # human-readable
lane: {{LANE}}                          # lowercase: embed, nli, rerank, time, sevenq, axiom, route, conv, claim, sum, graph, pub
status: {{STATUS}}                      # draft | active | paused | retired
order: {{ORDER}}                        # display/sort hint within lane (integer, not strict)
purpose: >
  {{PURPOSE}}

# What this station calls. For model-wrapper stations this is the bound model.
# For LLM stations this is the API model id (gpt-4o-mini, claude-opus-4-7, etc.).
model:
  primary:   {{MODEL_PRIMARY}}          # e.g. M-EMB-SCI-001 or gpt-4o-mini
  fallback:  {{MODEL_FALLBACK}}
  provider:  {{MODEL_PROVIDER}}         # local_wrapper | openai | anthropic | hf

prompt:
  primary:   {{PROMPT_PRIMARY}}         # filename in this folder, e.g. PROMPT_SYSTEM.md
  fallback:  {{PROMPT_FALLBACK}}

script:
  runner:    {{SCRIPT_RUNNER}}          # entry point, e.g. scripts/run.py or scripts/03_run_prompt.bat

input:
  accepts:
    - {{INPUT_TYPE}}                    # e.g. markdown_article, text_pair, query_passages
  required_files:
    - {{INPUT_FILE}}                    # primary input filename convention

output:
  produces:
    - {{OUTPUT_FILE_JSON}}
    - {{OUTPUT_FILE_MD}}
  required_format: json

healthcheck:
  prompt: "Return JSON: {\"status\":\"ok\"}"
  expected_contains: "\"status\""

gate:
  pass_if:
    - valid_json: true
    - {{GATE_RULE}}
  fail_to: 99_ERROR
  review_to: 03_REVIEW

next:
  pass:
    - {{NEXT_STATION_PASS}}
  fail:
    - ST-ERR-001
