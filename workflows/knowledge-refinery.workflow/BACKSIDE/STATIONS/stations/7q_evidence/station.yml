# Station contract — copy from _TEMPLATE/
# Mirrors the shape of MODELS/_TEMPLATE/model.yml so stations and models read alike.
# new_station.py substitutes every {{PLACEHOLDER}} from CLI args.

station_id: ST-SEVENQ-003
name: 7Q Evidence (pressure)
lane: sevenq
status: draft
order: 11
purpose: >
  Evidence pressure pass — classify evidence as direct / indirect / analogical / weak / conflicting; identify gaps; prepare citation targets.

# What this station calls. For model-wrapper stations this is the bound model.
# For LLM stations this is the API model id (gpt-4o-mini, claude-opus-4-7, etc.).
model:
  primary:   gpt-4o-mini
  fallback:  
  provider:  openai

prompt:
  primary:   PROMPT_SYSTEM.md
  fallback:  

script:
  runner:    scripts/03_run_prompt.bat

input:
  accepts:
    - forward_plus_reverse                    # e.g. markdown_article, text_pair, query_passages
  required_files:
    - source.md                    # primary input filename convention

output:
  produces:
    - evidence_7q.json
    - evidence_7q.md
  required_format: json

healthcheck:
  prompt: "Return JSON: {\"status\":\"ok\"}"
  expected_contains: "\"status\""

gate:
  pass_if:
    - valid_json: true
    - has_evidence_classes: true
  fail_to: 99_ERROR
  review_to: 03_REVIEW

next:
  pass:
    - ST-GRAPH-001
  fail:
    - ST-ERR-001