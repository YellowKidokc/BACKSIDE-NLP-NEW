# Station contract - source for stations_registry.yml rebuild.

station_id: ST-TRACE-001
name: Span Trace
lane: trace
status: draft
order: 8
purpose: >
  Parse HTML or Markdown into stable source spans before claim extraction and scoring.
  Assign trace IDs, section IDs, paragraph indexes, sentence indexes, character offsets,
  quoted spans, and trace_status values. Later stations must reference these trace IDs.

model:
  primary: none
  fallback:
  provider: local_wrapper

prompt:
  primary: PROMPT_SYSTEM.md
  fallback:

script:
  runner: scripts/03_run_prompt.bat

input:
  accepts:
    - html_article
    - markdown_article
    - plain_text
  required_files:
    - source.md

output:
  produces:
    - trace-ledger.json
    - trace-ledger.csv
    - trace-ledger.md
  required_format: json

healthcheck:
  prompt: "Return JSON: {\"status\":\"ok\"}"
  expected_contains: "\"status\""

gate:
  pass_if:
    - valid_json: true
    - trace_ids_non_empty: true
    - no_blank_trace_status: true
  fail_to: 99_ERROR
  review_to: 03_REVIEW

next:
  pass:
    - ST-CLAIM-001
    - ST-SEVENQ-001
  fail:
    - ST-ERR-001
