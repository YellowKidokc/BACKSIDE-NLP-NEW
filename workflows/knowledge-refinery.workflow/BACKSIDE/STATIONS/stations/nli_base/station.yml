# Station contract — copy from _TEMPLATE/
# Mirrors the shape of MODELS/_TEMPLATE/model.yml so stations and models read alike.
# new_station.py substitutes every {{PLACEHOLDER}} from CLI args.

station_id: ST-NLI-004
name: NLI Base (legacy)
lane: nli
status: draft
order: 7
purpose: >
  Baseline NLI (legacy) — kept as fallback / regression baseline.

# What this station calls. For model-wrapper stations this is the bound model.
# For LLM stations this is the API model id (gpt-4o-mini, claude-opus-4-7, etc.).
model:
  primary:   M-NLI-BASE-001
  fallback:  
  provider:  local_wrapper

prompt:
  primary:   PROMPT_SYSTEM.md
  fallback:  

script:
  runner:    scripts/03_run_prompt.bat

input:
  accepts:
    - claim_pairs_json                    # e.g. markdown_article, text_pair, query_passages
  required_files:
    - pairs.json                    # primary input filename convention

output:
  produces:
    - result.json
    - result.md
  required_format: json

healthcheck:
  prompt: "Return JSON: {\"status\":\"ok\"}"
  expected_contains: "\"status\""

gate:
  pass_if:
    - valid_json: true
    - all_labels_present: true
  fail_to: 99_ERROR
  review_to: 03_REVIEW

next:
  pass:
    - ST-TBD-000
  fail:
    - ST-ERR-001