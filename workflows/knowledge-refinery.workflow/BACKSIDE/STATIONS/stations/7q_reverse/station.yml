# Station contract — copy from _TEMPLATE/
# Mirrors the shape of MODELS/_TEMPLATE/model.yml so stations and models read alike.
# new_station.py substitutes every {{PLACEHOLDER}} from CLI args.

station_id: ST-SEVENQ-002
name: 7Q Reverse (kill test)
lane: sevenq
status: draft
order: 10
purpose: >
  Reverse 7-Question Scientific Method — adversarial kill test (R1..R7). Find the weakest link, test if the claim survives.

# What this station calls. For model-wrapper stations this is the bound model.
# For LLM stations this is the API model id (gpt-4o-mini, claude-opus-4-7, etc.).
model:
  primary:   gpt-4o-mini
  fallback:  
  provider:  openai

prompt:
  primary:   PROMPT_SYSTEM.md
  fallback:  

script:
  runner:    scripts/03_run_prompt.bat

input:
  accepts:
    - paper_plus_forward_7q                    # e.g. markdown_article, text_pair, query_passages
  required_files:
    - source.md                    # primary input filename convention

output:
  produces:
    - reverse_7q.json
    - reverse_7q.md
  required_format: json

healthcheck:
  prompt: "Return JSON: {\"status\":\"ok\"}"
  expected_contains: "\"status\""

gate:
  pass_if:
    - valid_json: true
    - has_verdict: true
  fail_to: 99_ERROR
  review_to: 03_REVIEW

next:
  pass:
    - ST-SEVENQ-003
  fail:
    - ST-ERR-001