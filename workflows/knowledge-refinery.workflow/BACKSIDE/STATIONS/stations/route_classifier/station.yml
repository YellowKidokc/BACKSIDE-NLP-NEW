# Station contract — copy from _TEMPLATE/
# Mirrors the shape of MODELS/_TEMPLATE/model.yml so stations and models read alike.
# new_station.py substitutes every {{PLACEHOLDER}} from CLI args.

station_id: ST-ROUTE-001
name: Route Classifier
lane: route
status: draft
order: 12
purpose: >
  Inspect a dropped file, detect type (PDF/HTML/MD/DOCX/transcript/audio/video/JSON), assign workflow lane, produce routing.yml.

# What this station calls. For model-wrapper stations this is the bound model.
# For LLM stations this is the API model id (gpt-4o-mini, claude-opus-4-7, etc.).
model:
  primary:   none
  fallback:  
  provider:  local_wrapper

prompt:
  primary:   PROMPT_SYSTEM.md
  fallback:  

script:
  runner:    scripts/03_run_prompt.bat

input:
  accepts:
    - any_file                    # e.g. markdown_article, text_pair, query_passages
  required_files:
    - source.any                    # primary input filename convention (placeholder)

output:
  produces:
    - routing.yml
    - routing.md
  required_format: json

healthcheck:
  prompt: "Return JSON: {\"status\":\"ok\"}"
  expected_contains: "\"status\""

gate:
  pass_if:
    - valid_json: true
    - route_assigned: true
  fail_to: 99_ERROR
  review_to: 03_REVIEW

next:
  pass:
    - ST-CONV-001
  fail:
    - ST-ERR-001
