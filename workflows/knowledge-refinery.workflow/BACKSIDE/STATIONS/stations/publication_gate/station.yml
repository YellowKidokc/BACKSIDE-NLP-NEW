# Station contract — copy from _TEMPLATE/
# Mirrors the shape of MODELS/_TEMPLATE/model.yml so stations and models read alike.
# new_station.py substitutes every {{PLACEHOLDER}} from CLI args.

station_id: ST-PUB-001
name: Publication Gate
lane: pub
status: draft
order: 17
purpose: >
  Read all artifacts. Check readiness (claims extracted, summary exists, reverse pass survived, evidence gaps acceptable, graph built, contradictions resolved). Recommend destination: website / Substack / Zenodo / Proof Explorer / Obsidian Canon / Review / Archive.

# What this station calls. For model-wrapper stations this is the bound model.
# For LLM stations this is the API model id (gpt-4o-mini, claude-opus-4-7, etc.).
model:
  primary:   none
  fallback:  
  provider:  local_wrapper

prompt:
  primary:   PROMPT_SYSTEM.md
  fallback:  

script:
  runner:    scripts/03_run_prompt.bat

input:
  accepts:
    - all_prior_artifacts                    # e.g. markdown_article, text_pair, query_passages
  required_files:
    - source.md                    # primary input filename convention

output:
  produces:
    - publication_status.yml
    - release_recommendation.md
  required_format: json

healthcheck:
  prompt: "Return JSON: {\"status\":\"ok\"}"
  expected_contains: "\"status\""

gate:
  pass_if:
    - valid_json: true
    - readiness_threshold_met: true
  fail_to: 99_ERROR
  review_to: 03_REVIEW

next:
  pass:
    - ST-TBD-000
  fail:
    - ST-ERR-001