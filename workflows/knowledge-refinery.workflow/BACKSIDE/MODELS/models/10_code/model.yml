model_id: qwen_or_gemma_code_worker
provider: ollama
role: code_worker
status: placeholder

runtime:
  engine: ollama
  model_name: qwen2.5-coder:latest
  endpoint: http://localhost:11434

capabilities:
  - code_generation
  - code_repair
  - json_output

limits:
  temperature_default: 0.1

station_use:
  - 03_cleaner
  - 10_math_checker
  - 13_knowledge_graph

healthcheck:
  prompt: "Return JSON: {\"status\":\"ok\"}"
  expected_contains: "\"status\""

outputs:
  required_format: json

