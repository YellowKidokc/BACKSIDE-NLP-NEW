model_id: qwen3_reasoning_worker
provider: ollama
role: reasoning_general
status: placeholder

runtime:
  engine: ollama
  model_name: qwen3:latest
  endpoint: http://localhost:11434

capabilities:
  - reasoning
  - json_output
  - synthesis

limits:
  max_context_tokens: 32768
  temperature_default: 0.1

station_use:
  - 06_7qs_forward
  - 07_7qs_reverse
  - 12_axiom_promotion

healthcheck:
  prompt: "Return JSON: {\"status\":\"ok\"}"
  expected_contains: "\"status\""

outputs:
  required_format: json

