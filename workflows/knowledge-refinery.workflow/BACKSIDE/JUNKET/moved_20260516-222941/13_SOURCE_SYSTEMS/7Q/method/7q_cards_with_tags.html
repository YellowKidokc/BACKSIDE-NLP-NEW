<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>7Q Cards + Tags — Theophysics</title>
<style>
:root{--bg:#0a0b0f;--card:#12141c;--border:#1e2233;--border2:#2a3050;--text:#e8e6e1;--text2:#8a8d9b;--text3:#555869;--gold:#d4a853;
--q0:#8a8d9b;--q1:#d4a853;--q2:#7c6340;--q3:#6b8c42;--q4:#38bdf8;--q5:#a0724a;--q6:#34d399;--q7:#ef4444;
--mono:'JetBrains Mono',ui-monospace,monospace;--serif:Georgia,'Times New Roman',serif;--sans:'DM Sans',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding:32px 20px}
.page-header{text-align:center;margin-bottom:32px}
.page-header h1{font-family:var(--serif);font-size:28px;margin-bottom:4px}
.page-header p{color:var(--text2);font-size:12px}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:16px;max-width:1200px;margin:0 auto}
@media(max-width:500px){.card-grid{grid-template-columns:1fr}}

/* ═══ TIGHTER CARD ═══ */
.q-card{display:grid;grid-template-columns:140px 1fr;border:1px solid var(--border);border-radius:12px;background:var(--card);overflow:hidden;transition:.2s}
.q-card:hover{border-color:var(--border2);box-shadow:0 6px 24px rgba(0,0,0,.2)}

.card-visual{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;border-right:1px solid var(--border);background:rgba(0,0,0,.15)}
.card-visual svg{width:100px;height:auto}
.zone-label{font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-top:4px}

.card-content{padding:14px;display:flex;flex-direction:column;gap:2px}
.card-top{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.card-q{font-family:var(--serif);font-size:28px;font-weight:700;line-height:1}
.card-verb{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:600}
.card-title{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--text)}
.card-subtitle{font-size:12px;color:var(--text2);font-style:italic}
.card-divider{height:1px;background:var(--border);margin:6px 0}
.desc-label{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:2px}
.card-desc{font-size:12px;color:var(--text2);line-height:1.5}

/* Score row */
.card-score{display:flex;align-items:center;gap:8px;margin-top:8px;padding:5px 8px;background:rgba(0,0,0,.2);border-radius:6px;border:1px solid var(--border)}
.score-label{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text3)}
.score-val{font-family:var(--mono);font-size:16px;font-weight:700}
.score-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.score-fill{height:100%;border-radius:3px;transition:width .4s}

/* ═══ TAG PILLS ═══ */
.tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tag-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-family:var(--mono);font-size:9px;letter-spacing:.5px;border:1px solid;cursor:default;transition:.15s}
.tag-pill:hover{filter:brightness(1.3)}
.tag-key{text-transform:uppercase;opacity:.6;font-size:8px}
.tag-val{font-weight:600}

/* Tag colors by type */
.tag-chi{color:#d4a853;border-color:rgba(212,168,83,.3);background:rgba(212,168,83,.06)}
.tag-domain{color:#38bdf8;border-color:rgba(56,189,248,.3);background:rgba(56,189,248,.06)}
.tag-layer{color:#34d399;border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.06)}
.tag-status{color:#a78bfa;border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.06)}
.tag-confidence{color:#fb923c;border-color:rgba(251,146,60,.3);background:rgba(251,146,60,.06)}
.tag-series{color:#f472b6;border-color:rgba(244,114,182,.3);background:rgba(244,114,182,.06)}
.tag-iso{color:#e8e6e1;border-color:rgba(232,230,225,.2);background:rgba(232,230,225,.04)}
</style>
</head>
<body>

<div class="page-header">
  <h1>7Q Framework Cards</h1>
  <p>Each card carries the seven tracking tags. Tighter layout. Same trees.</p>
</div>

<div class="card-grid" id="cardGrid"></div>

<script>
const CARDS = [
  {id:'q0',num:'Q0',verb:'ARRIVE',title:'Empty Soil',subtitle:'Posture Before Inquiry',
   color:'#8a8d9b',zone:'bedrock',desc:'The inquirer cannot be the ground of inquiry. Arrive open.',
   tags:{chi:['—'],domain:['epistemology'],layer:'axiom',status:'complete',confidence:'proven',series:'FT',iso:'none'},score:0},
  {id:'q1',num:'Q1',verb:'DEFINE',title:'The Seed',subtitle:'Identity — What Is It?',
   color:'#d4a853',zone:'seed',desc:'Name it. Classify it. Prevent category confusion.',
   tags:{chi:['E','K'],domain:['mathematics','information'],layer:'tool',status:'complete',confidence:'proven',series:'FT',iso:'structural'},score:0},
  {id:'q2',num:'Q2',verb:'LOCATE',title:'The Soil',subtitle:'Domain — Where Does It Live?',
   color:'#7c6340',zone:'soil',desc:'Anchor in domain and scale. Check cross-domain presence.',
   tags:{chi:['G','M'],domain:['physics','theology'],layer:'tool',status:'complete',confidence:'proven',series:'FT',iso:'structural'},score:0},
  {id:'q3',num:'Q3',verb:'COMMIT',title:'The Sprout',subtitle:'Assertion — What Does It Say?',
   color:'#6b8c42',zone:'trunk',desc:'Force precision. Generate the negation. Find bundled claims.',
   tags:{chi:['E','S'],domain:['mathematics'],layer:'tool',status:'complete',confidence:'proven',series:'FT',iso:'none'},score:0},
  {id:'q4',num:'Q4',verb:'SUPPORT',title:'The Rain',subtitle:'Evidence — What Supports It?',
   color:'#38bdf8',zone:'rain',desc:'Three channels: PS × ED × EC. Why-penalty caps at 50%.',
   tags:{chi:['T','Q'],domain:['physics','psychology'],layer:'tool',status:'complete',confidence:'proven',series:'FT',iso:'structural'},score:0},
  {id:'q5',num:'Q5',verb:'GROUND',title:'The Roots',subtitle:'Dependencies — What Does It Depend On?',
   color:'#a0724a',zone:'roots',desc:'Trace the chain down. Axiom, brute fact, or loop?',
   tags:{chi:['G','R'],domain:['mathematics','theology'],layer:'tool',status:'complete',confidence:'proven',series:'FT',iso:'structural'},score:0},
  {id:'q6',num:'Q6',verb:'PROPAGATE',title:'The Canopy',subtitle:'Consequences — What Does It Force?',
   color:'#34d399',zone:'canopy',desc:'Predictions. Constraints. Cross-domain implications.',
   tags:{chi:['K','F','C'],domain:['physics','information'],layer:'tool',status:'complete',confidence:'proven',series:'FT',iso:'structural'},score:0},
  {id:'q7',num:'Q7',verb:'DESTROY',title:'The Axe',subtitle:'Falsification — What Kills It?',
   color:'#ef4444',zone:'axe',desc:'Five death conditions. Every object carries its own death warrant.',
   tags:{chi:['S','Q'],domain:['physics','theology'],layer:'tool',status:'complete',confidence:'proven',series:'FT',iso:'none'},score:0},
];

function treeSVG(zone, color) {
  const dim=0.08, hi=0.85;
  let s=`<svg viewBox="0 0 170 280" xmlns="http://www.w3.org/2000/svg">`;
  const bedA=zone==='bedrock'?hi:dim;
  s+=`<rect x="0" y="230" width="170" height="50" fill="#2a2035" opacity="${bedA}"/>`;
  const rootA=zone==='roots'?hi:dim;
  s+=`<rect x="0" y="170" width="170" height="60" fill="#3d2b1f" opacity="${rootA}"/>`;
  if(zone==='roots'){
    s+=`<line x1="85" y1="170" x2="20" y2="225" stroke="#a0724a" stroke-width="3" opacity=".7"/>`;
    s+=`<line x1="85" y1="170" x2="150" y2="225" stroke="#a0724a" stroke-width="3" opacity=".7"/>`;
    s+=`<line x1="85" y1="170" x2="85" y2="235" stroke="#a0724a" stroke-width="2.5" opacity=".7"/>`;
  }
  const soilA=zone==='soil'?hi:dim;
  s+=`<rect x="0" y="155" width="170" height="15" fill="#4a3728" opacity="${soilA}"/>`;
  if(zone==='seed'){
    s+=`<ellipse cx="85" cy="160" rx="8" ry="5" fill="${color}" opacity=".9"/>`;
    s+=`<ellipse cx="85" cy="160" rx="14" ry="9" fill="none" stroke="${color}" stroke-width=".8" opacity=".4"/>`;
  }
  const trunkA=zone==='trunk'?hi:dim;
  s+=`<rect x="76" y="80" width="18" height="75" rx="2" fill="#5c3d2e" opacity="${trunkA}"/>`;
  if(zone==='trunk'){
    s+=`<line x1="85" y1="150" x2="85" y2="85" stroke="${color}" stroke-width="1.5" stroke-dasharray="4,3"/>`;
    s+=`<polygon points="80,90 85,78 90,90" fill="${color}"/>`;
  }
  if(zone==='rain'){
    s+=`<circle cx="85" cy="18" r="10" fill="${color}" opacity=".5"/>`;
    s+=`<line x1="55" y1="28" x2="60" y2="58" stroke="${color}" stroke-width="1.5" opacity=".6"/>`;
    s+=`<line x1="85" y1="24" x2="85" y2="56" stroke="${color}" stroke-width="1.5" opacity=".5"/>`;
    s+=`<line x1="115" y1="28" x2="112" y2="58" stroke="${color}" stroke-width="1.5" opacity=".6"/>`;
  }
  const canA=zone==='canopy'?hi:dim;
  s+=`<ellipse cx="85" cy="55" rx="58" ry="42" fill="#2d5a2a" opacity="${canA}"/>`;
  s+=`<ellipse cx="65" cy="45" rx="35" ry="28" fill="#3a6b35" opacity="${canA*.9}"/>`;
  s+=`<ellipse cx="108" cy="50" rx="30" ry="25" fill="#336630" opacity="${canA*.85}"/>`;
  if(zone==='canopy'){
    s+=`<circle cx="50" cy="70" r="5" fill="${color}"/><circle cx="125" cy="65" r="5" fill="${color}"/><circle cx="85" cy="30" r="4" fill="${color}"/>`;
  }
  if(zone==='axe'){
    s+=`<line x1="35" y1="120" x2="73" y2="120" stroke="${color}" stroke-width="3"/>`;
    s+=`<polygon points="30,112 35,120 30,128 24,120" fill="${color}" opacity=".9"/>`;
  }
  s+=`</svg>`;
  return s;
}

function renderTags(tags) {
  let html = '';
  // χ variables
  if(tags.chi && tags.chi[0]!=='—') html += tags.chi.map(v=>`<span class="tag-pill tag-chi"><span class="tag-key">χ</span><span class="tag-val">${v}</span></span>`).join('');
  else html += `<span class="tag-pill tag-chi"><span class="tag-key">χ</span><span class="tag-val">—</span></span>`;
  // domain
  if(tags.domain) tags.domain.forEach(d=>html+=`<span class="tag-pill tag-domain"><span class="tag-val">${d}</span></span>`);
  // layer
  html += `<span class="tag-pill tag-layer"><span class="tag-val">${tags.layer}</span></span>`;
  // status
  html += `<span class="tag-pill tag-status"><span class="tag-val">${tags.status}</span></span>`;
  // confidence
  html += `<span class="tag-pill tag-confidence"><span class="tag-val">${tags.confidence}</span></span>`;
  // series
  html += `<span class="tag-pill tag-series"><span class="tag-val">${tags.series}</span></span>`;
  // iso
  if(tags.iso && tags.iso!=='none') html += `<span class="tag-pill tag-iso"><span class="tag-key">ISO</span><span class="tag-val">${tags.iso}</span></span>`;
  return html;
}

function renderCards() {
  document.getElementById('cardGrid').innerHTML = CARDS.map(c => {
    const scoreColor = c.score > 0.7 ? '#34d399' : c.score > 0.4 ? '#d4a853' : '#ef4444';
    const scoreWidth = Math.max(c.score * 100, 2);
    return `<div class="q-card" style="border-top:2px solid ${c.color}">
      <div class="card-visual">
        ${treeSVG(c.zone, c.color)}
        <div class="zone-label" style="color:${c.color}">${c.zone}</div>
      </div>
      <div class="card-content">
        <div class="card-top">
          <div class="card-q" style="color:${c.color}">${c.num}</div>
          <div class="card-verb" style="color:${c.color}">${c.verb}</div>
        </div>
        <div class="card-title">${c.title}</div>
        <div class="card-subtitle">${c.subtitle}</div>
        <div class="card-divider"></div>
        <div class="desc-label">DESCRIPTION</div>
        <div class="card-desc">${c.desc}</div>
        <div class="card-score">
          <div class="score-label">SCORE</div>
          <div class="score-val" style="color:${scoreColor}">${c.score.toFixed(2)}</div>
          <div class="score-bar"><div class="score-fill" style="width:${scoreWidth}%;background:${c.color}"></div></div>
        </div>
        <div class="tag-row">${renderTags(c.tags)}</div>
      </div>
    </div>`;
  }).join('');
}

renderCards();
</script>
</body>
</html>
