<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>7Q Interactive Cards — Schema-Driven UI</title>
<style>
:root{--bg:#0a0b0f;--card:#12141c;--border:#1e2233;--border2:#2a3050;--text:#e8e6e1;--text2:#8a8d9b;--text3:#555869;--gold:#d4a853;
--q0:#8a8d9b;--q1:#d4a853;--q2:#7c6340;--q3:#6b8c42;--q4:#38bdf8;--q5:#a0724a;--q6:#34d399;--q7:#ef4444;
--mono:'JetBrains Mono',ui-monospace,monospace;--serif:Georgia,'Times New Roman',serif;--sans:'DM Sans',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding:40px 24px}
.page-header{text-align:center;margin-bottom:40px}
.page-header h1{font-family:var(--serif);font-size:36px;margin-bottom:8px}
.page-header p{color:var(--text2);font-size:14px}

/* ═══ CARD GRID ═══ */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(520px,1fr));gap:20px;max-width:1200px;margin:0 auto}
@media(max-width:600px){.card-grid{grid-template-columns:1fr}}

/* ═══ CARD ═══ */
.q-card{display:grid;grid-template-columns:180px 1fr;border:1px solid var(--border);border-radius:14px;background:var(--card);overflow:hidden;transition:.2s}
.q-card:hover{border-color:var(--border2);box-shadow:0 8px 30px rgba(0,0,0,.2)}

/* Left visual panel */
.card-visual{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;border-right:1px solid var(--border);background:rgba(0,0,0,.15)}
.card-visual svg{width:120px;height:auto;margin-bottom:8px}
.zone-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:600}

/* Right content panel */
.card-content{padding:20px;display:flex;flex-direction:column;gap:4px}
.card-top{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.card-q{font-family:var(--serif);font-size:36px;font-weight:700;line-height:1}
.card-verb{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:600}

/* Editable fields */
.card-title{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--text);outline:none;border-bottom:1px solid transparent;transition:.15s;padding:2px 0}
.card-title:hover{border-bottom-color:var(--border2)}
.card-title:focus{border-bottom-color:var(--gold);background:rgba(212,168,83,.03)}
.card-subtitle{font-size:13px;color:var(--text2);outline:none;padding:2px 0;border-bottom:1px solid transparent;transition:.15s}
.card-subtitle:hover{border-bottom-color:var(--border2)}
.card-subtitle:focus{border-bottom-color:var(--gold);background:rgba(212,168,83,.03)}
.card-divider{height:1px;background:var(--border);margin:8px 0}
.card-desc{font-size:13px;color:var(--text2);line-height:1.6;outline:none;padding:4px 0;min-height:40px;border:1px solid transparent;border-radius:6px;transition:.15s}
.card-desc:hover{border-color:var(--border2)}
.card-desc:focus{border-color:var(--gold);background:rgba(212,168,83,.03);padding:4px 6px}

/* Fields area */
.card-fields{margin-top:8px;display:grid;gap:6px}
.field-row{display:grid;grid-template-columns:100px 1fr;gap:8px;align-items:start}
.field-label{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);padding-top:4px}
.field-input{font-size:12px;color:var(--text2);background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;outline:none;font-family:var(--sans);resize:vertical;min-height:28px;transition:.15s}
.field-input:focus{border-color:var(--gold);background:rgba(212,168,83,.03)}
.field-input::placeholder{color:var(--text3)}

/* Score badge */
.card-score{display:flex;align-items:center;gap:8px;margin-top:8px;padding:6px 8px;background:rgba(0,0,0,.2);border-radius:8px;border:1px solid var(--border)}
.score-val{font-family:var(--mono);font-size:18px;font-weight:700}
.score-label{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text3)}
.score-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.score-fill{height:100%;border-radius:3px;transition:width .4s}

/* Accent line */
.card-accent{height:3px;margin-top:auto}

/* Action buttons */
.card-actions{display:flex;gap:6px;margin-top:10px}
.card-btn{padding:4px 10px;border-radius:6px;background:rgba(0,0,0,.3);border:1px solid var(--border);color:var(--text3);font-size:10px;font-family:var(--mono);cursor:pointer;transition:.12s;letter-spacing:.5px}
.card-btn:hover{color:var(--text);border-color:var(--border2)}
.card-btn.ai{color:var(--gold);border-color:rgba(212,168,83,.3)}
.card-btn.ai:hover{background:rgba(212,168,83,.1)}

/* Transform badge */
.transform{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:4px}
.transform .arrow{color:var(--gold);margin:0 4px}

/* ═══ BOTTOM CONTROLS ═══ */
.controls{max-width:1200px;margin:32px auto 0;display:flex;gap:12px;flex-wrap:wrap}
.ctrl-btn{padding:8px 16px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--text2);font-size:12px;cursor:pointer;font-family:var(--sans);transition:.12s}
.ctrl-btn:hover{color:var(--text);border-color:var(--border2)}
.ctrl-btn.gold{color:var(--gold);border-color:rgba(212,168,83,.3)}
.ctrl-btn.gold:hover{background:rgba(212,168,83,.08)}

.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--gold);border-radius:10px;padding:10px 16px;font-size:12px;color:var(--gold);opacity:0;transition:.3s;pointer-events:none;z-index:100}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="page-header">
  <h1>7Q Interactive Cards</h1>
  <p>Click any text to edit. AI fills fields. Export to YAML. Same design, now alive.</p>
</div>

<div class="card-grid" id="cardGrid"></div>

<div class="controls">
  <button class="ctrl-btn gold" onclick="exportAllYAML()">Export All → YAML</button>
  <button class="ctrl-btn gold" onclick="exportAllJSON()">Export All → JSON</button>
  <button class="ctrl-btn" onclick="clearAll()">Clear All Fields</button>
  <button class="ctrl-btn" onclick="loadSample()">Load GR Example</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// CARD DATA SCHEMA
// ═══════════════════════════════════════════
const CARDS = [
  {id:'q0',num:'Q0',verb:'ARRIVE',title:'Empty Soil',subtitle:'Posture Before Inquiry',
   color:'#8a8d9b',zone:'bedrock',transform:['—','open'],
   fields:[{key:'posture',label:'Posture',placeholder:'How did you arrive at this inquiry?'}],
   desc:'The inquirer cannot be the ground of inquiry. Arrive open. Arrive humble.'},
  {id:'q1',num:'Q1',verb:'DEFINE',title:'The Seed',subtitle:'Identity — What Is It?',
   color:'#d4a853',zone:'seed',transform:['undefined','defined'],
   fields:[{key:'claim_type',label:'Claim Type',placeholder:'causal / descriptive / ontological / mathematical / predictive / mechanistic / normative'},{key:'tier',label:'Tier',placeholder:'foundational / derived / constraint / support / connection'},{key:'name',label:'Label',placeholder:'Name this claim precisely...'}],
   desc:'Name it. Classify it. Prevent category confusion.'},
  {id:'q2',num:'Q2',verb:'LOCATE',title:'The Soil',subtitle:'Domain — Where Does It Live?',
   color:'#7c6340',zone:'soil',transform:['defined','located'],
   fields:[{key:'primary_domain',label:'Domain',placeholder:'physics / theology / consciousness / information / math / biology...'},{key:'cross_domains',label:'Cross-Domain',placeholder:'Additional domains where this appears...'},{key:'iso_status',label:'Isomorphism',placeholder:'ISO-confirmed / ISO-parallel / ISO-analogy / none'}],
   desc:'Anchor in domain and scale. Check cross-domain presence.'},
  {id:'q3',num:'Q3',verb:'COMMIT',title:'The Sprout',subtitle:'Assertion — What Does It Say?',
   color:'#6b8c42',zone:'trunk',transform:['located','stated'],
   fields:[{key:'assertion',label:'Statement',placeholder:'One sentence. No hedging.'},{key:'negation',label:'Negation',placeholder:'The logical opposite (auto-generated)...'},{key:'precision',label:'Precision',placeholder:'vague / basic / detailed / mathematical / precise'}],
   desc:'Force precision. Generate the negation. Find bundled claims.'},
  {id:'q4',num:'Q4',verb:'SUPPORT',title:'The Rain',subtitle:'Evidence — What Supports It?',
   color:'#38bdf8',zone:'rain',transform:['stated','supported'],
   fields:[{key:'ps',label:'PS',placeholder:'Phenomenon Strength (0-1): reproducibility, effect size, measurement quality'},{key:'ed',label:'ED',placeholder:'Explanatory Depth (0-1): mechanism clarity, constraints, scope'},{key:'ec',label:'EC',placeholder:'Experiential Coherence (0-1): consistency, stability, transformation, pattern'},{key:'competing',label:'Competing?',placeholder:'Could this evidence equally support a competing model?'}],
   desc:'Three channels: PS × ED × EC. The why-penalty caps unexplained evidence at 50%.'},
  {id:'q5',num:'Q5',verb:'GROUND',title:'The Roots',subtitle:'Dependencies — What Does It Depend On?',
   color:'#a0724a',zone:'roots',transform:['supported','grounded'],
   fields:[{key:'depends_on',label:'Depends On',placeholder:'List upstream dependencies...'},{key:'terminus',label:'Terminus',placeholder:'axiom / brute_fact / circularity / open'},{key:'fragility',label:'Fragility',placeholder:'If this foundation fails: immediate_collapse / graceful_degradation / independent_survival'}],
   desc:'Trace the chain down. Axiom, brute fact, or loop?'},
  {id:'q6',num:'Q6',verb:'PROPAGATE',title:'The Canopy',subtitle:'Consequences — What Does It Force?',
   color:'#34d399',zone:'canopy',transform:['grounded','generative'],
   fields:[{key:'predictions',label:'Predictions',placeholder:'What MUST be true if this claim is true?'},{key:'cross_force',label:'Cross-Domain',placeholder:'Consequences that land in other fields...'},{key:'untested',label:'Untested',placeholder:'Predictions not yet checked...'}],
   desc:'Predictions. Constraints. Cross-domain implications.'},
  {id:'q7',num:'Q7',verb:'DESTROY',title:'The Axe',subtitle:'Falsification — What Kills It?',
   color:'#ef4444',zone:'axe',transform:['generative','testable'],
   fields:[{key:'kill_1',label:'Death #1',placeholder:'Self-refutation — destroys itself when stated'},{key:'kill_2',label:'Death #2',placeholder:'Infinite regress — pushes question backward forever'},{key:'kill_3',label:'Death #3',placeholder:'Empirical contradiction — contradicts observed data'},{key:'kill_4',label:'Death #4',placeholder:'Logical incoherence — contradicts its own chain'},{key:'kill_5',label:'Death #5',placeholder:'Explanatory failure — stops generating'}],
   desc:'Five death conditions. Every object carries its own death warrant.'},
];

// ═══════════════════════════════════════════
// TREE SVG GENERATOR (matches matplotlib icons)
// ═══════════════════════════════════════════
function treeSVG(zone, color) {
  const dim = 0.08, hi = 0.85;
  let svg = `<svg viewBox="0 0 170 280" xmlns="http://www.w3.org/2000/svg">`;
  // Bedrock
  const bedA = zone==='bedrock'?hi:dim;
  svg += `<rect x="0" y="230" width="170" height="50" fill="#2a2035" opacity="${bedA}"/>`;
  // Deep soil / roots
  const rootA = zone==='roots'?hi:dim;
  svg += `<rect x="0" y="170" width="170" height="60" fill="#3d2b1f" opacity="${rootA}"/>`;
  if(zone==='roots'){
    svg += `<line x1="85" y1="170" x2="20" y2="225" stroke="#a0724a" stroke-width="3" opacity=".7"/>`;
    svg += `<line x1="85" y1="170" x2="150" y2="225" stroke="#a0724a" stroke-width="3" opacity=".7"/>`;
    svg += `<line x1="85" y1="170" x2="85" y2="235" stroke="#a0724a" stroke-width="2.5" opacity=".7"/>`;
  }
  // Soil surface
  const soilA = zone==='soil'?hi:dim;
  svg += `<rect x="0" y="155" width="170" height="15" fill="#4a3728" opacity="${soilA}"/>`;
  // Seed
  if(zone==='seed'){
    svg += `<ellipse cx="85" cy="160" rx="8" ry="5" fill="${color}" opacity=".9"/>`;
    svg += `<ellipse cx="85" cy="160" rx="14" ry="9" fill="none" stroke="${color}" stroke-width=".8" opacity=".4"/>`;
  }
  // Trunk
  const trunkA = zone==='trunk'?hi:dim;
  svg += `<rect x="76" y="80" width="18" height="75" rx="2" fill="#5c3d2e" opacity="${trunkA}"/>`;
  if(zone==='trunk'){
    svg += `<line x1="85" y1="150" x2="85" y2="85" stroke="${color}" stroke-width="1.5" stroke-dasharray="4,3"/>`;
    svg += `<polygon points="80,90 85,78 90,90" fill="${color}"/>`;
  }
  // Rain
  if(zone==='rain'){
    svg += `<circle cx="85" cy="18" r="10" fill="${color}" opacity=".5"/>`;
    svg += `<line x1="55" y1="28" x2="60" y2="58" stroke="${color}" stroke-width="1.5" opacity=".6"/>`;
    svg += `<line x1="85" y1="24" x2="85" y2="56" stroke="${color}" stroke-width="1.5" opacity=".5"/>`;
    svg += `<line x1="115" y1="28" x2="112" y2="58" stroke="${color}" stroke-width="1.5" opacity=".6"/>`;
  }
  // Canopy
  const canA = zone==='canopy'?hi:dim;
  svg += `<ellipse cx="85" cy="55" rx="58" ry="42" fill="#2d5a2a" opacity="${canA}"/>`;
  svg += `<ellipse cx="65" cy="45" rx="35" ry="28" fill="#3a6b35" opacity="${canA*.9}"/>`;
  svg += `<ellipse cx="108" cy="50" rx="30" ry="25" fill="#336630" opacity="${canA*.85}"/>`;
  if(zone==='canopy'){
    svg += `<circle cx="50" cy="70" r="5" fill="${color}"/><circle cx="125" cy="65" r="5" fill="${color}"/><circle cx="85" cy="30" r="4" fill="${color}"/>`;
  }
  // Axe
  if(zone==='axe'){
    svg += `<line x1="35" y1="120" x2="73" y2="120" stroke="${color}" stroke-width="3"/>`;
    svg += `<polygon points="30,112 35,120 30,128 24,120" fill="${color}" opacity=".9"/>`;
    svg += `<line x1="73" y1="120" x2="83" y2="113" stroke="${color}" stroke-width="1.5" opacity=".6"/>`;
    svg += `<line x1="73" y1="120" x2="83" y2="127" stroke="${color}" stroke-width="1.5" opacity=".6"/>`;
  }
  svg += `</svg>`;
  return svg;
}

// ═══════════════════════════════════════════
// RENDER CARDS
// ═══════════════════════════════════════════
function renderCards() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = CARDS.map(c => {
    const fieldsHTML = c.fields.map(f =>
      `<div class="field-row">
        <div class="field-label">${f.label}</div>
        <textarea class="field-input" data-card="${c.id}" data-field="${f.key}" placeholder="${f.placeholder}" rows="1" oninput="autoGrow(this)">${f.value||''}</textarea>
      </div>`
    ).join('');

    return `<div class="q-card" data-card-id="${c.id}" style="border-top:3px solid ${c.color}">
      <div class="card-visual">
        ${treeSVG(c.zone, c.color)}
        <div class="zone-label" style="color:${c.color}">${c.zone}</div>
      </div>
      <div class="card-content">
        <div class="card-top">
          <div class="card-q" style="color:${c.color}">${c.num}</div>
          <div class="card-verb" style="color:${c.color}">${c.verb}</div>
        </div>
        <div class="card-title" contenteditable="true" data-card="${c.id}" data-field="title">${c.title}</div>
        <div class="card-subtitle" contenteditable="true" data-card="${c.id}" data-field="subtitle">${c.subtitle}</div>
        <div class="transform">${c.transform[0]}<span class="arrow">→</span>${c.transform[1]}</div>
        <div class="card-divider"></div>
        <div class="card-desc" contenteditable="true" data-card="${c.id}" data-field="desc">${c.desc}</div>
        <div class="card-fields">${fieldsHTML}</div>
        <div class="card-score">
          <div><div class="score-val" data-card="${c.id}" data-field="score">—</div><div class="score-label">Score</div></div>
          <div class="score-bar"><div class="score-fill" style="width:0%;background:${c.color}"></div></div>
        </div>
        <div class="card-actions">
          <button class="card-btn" onclick="exportCardYAML('${c.id}')">YAML</button>
          <button class="card-btn" onclick="clearCard('${c.id}')">Clear</button>
          <button class="card-btn ai" onclick="toast('AI fill coming — wire to 7Q engine')">AI Fill</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
// FIELD OPERATIONS
// ═══════════════════════════════════════════
function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function getCardData(cardId) {
  const data = {id: cardId};
  document.querySelectorAll(`[data-card="${cardId}"]`).forEach(el => {
    const field = el.dataset.field;
    if (el.tagName === 'TEXTAREA') data[field] = el.value;
    else data[field] = el.innerText;
  });
  return data;
}

function getAllData() {
  return CARDS.map(c => getCardData(c.id));
}

function fillCard(cardId, data) {
  Object.keys(data).forEach(key => {
    const el = document.querySelector(`[data-card="${cardId}"][data-field="${key}"]`);
    if (!el) return;
    if (el.tagName === 'TEXTAREA') { el.value = data[key]; autoGrow(el); }
    else el.innerText = data[key];
  });
  // Update score bar
  if (data.score !== undefined) {
    const scoreEl = document.querySelector(`.q-card[data-card-id="${cardId}"] .score-fill`);
    if (scoreEl) scoreEl.style.width = (data.score * 100) + '%';
  }
}

function clearCard(cardId) {
  document.querySelectorAll(`[data-card="${cardId}"]`).forEach(el => {
    if (el.tagName === 'TEXTAREA') el.value = '';
    else if (el.dataset.field === 'score') el.innerText = '—';
  });
  const scoreEl = document.querySelector(`.q-card[data-card-id="${cardId}"] .score-fill`);
  if (scoreEl) scoreEl.style.width = '0%';
}

function clearAll() { CARDS.forEach(c => clearCard(c.id)); toast('All fields cleared'); }

// ═══════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════
function exportCardYAML(cardId) {
  const d = getCardData(cardId);
  const yaml = Object.entries(d).map(([k,v]) => `  ${k}: "${(v||'').replace(/"/g,'\\"')}"`).join('\n');
  navigator.clipboard.writeText(`${cardId}:\n${yaml}`);
  toast(`${cardId.toUpperCase()} copied to clipboard as YAML`);
}

function exportAllYAML() {
  const all = getAllData();
  const yaml = all.map(d => {
    const lines = Object.entries(d).map(([k,v]) => `  ${k}: "${(v||'').replace(/"/g,'\\"')}"`).join('\n');
    return `${d.id}:\n${lines}`;
  }).join('\n\n');
  navigator.clipboard.writeText(yaml);
  toast('All cards copied to clipboard as YAML');
}

function exportAllJSON() {
  const all = getAllData();
  navigator.clipboard.writeText(JSON.stringify(all, null, 2));
  toast('All cards copied to clipboard as JSON');
}

// ═══════════════════════════════════════════
// SAMPLE DATA (GR Example)
// ═══════════════════════════════════════════
function loadSample() {
  const gr = {
    q0: {posture:'Genuine puzzlement. Einstein resolved a tension between electromagnetism and mechanics — he did not set out to disprove Newton.'},
    q1: {claim_type:'causal',tier:'foundational',name:'Mass-energy curves spacetime (reclassified from descriptive at Q1)'},
    q2: {primary_domain:'physics',cross_domains:'mathematics (Riemannian geometry), machine learning (manifold learning), economics (curved utility), information theory (Fisher geometry)',iso_status:'ISO-confirmed'},
    q3: {assertion:'The distribution of mass-energy determines the curvature of spacetime, and free-falling objects follow geodesics through that curvature.',negation:'Mass-energy does NOT curve spacetime, OR objects do NOT follow geodesics. (Two independently killable claims found.)',precision:'mathematical'},
    q4: {ps:'0.95 — Mercury precession (exact), lensing (1919+), LIGO (2015), GPS (daily)',ed:'0.90 — Einstein Field Equations provide complete mechanism',ec:'0.85 — Century of engineering confirmation, GPS operational daily',competing:'No — quantitative predictions are unique to GR. No competing model matches all four.'},
    q5: {depends_on:'Equivalence principle, Riemannian geometry, c=const, energy-momentum conservation, smooth manifold assumption',terminus:'axiom (equivalence principle)',fragility:'Graceful degradation — if smooth manifold fails at Planck scale, GR still works everywhere else. HIDDEN: smooth manifold assumption has driven unsolved physics for 100 years.'},
    q6: {predictions:'Black holes must exist (confirmed). Gravitational waves must propagate (confirmed 2015). GPS needs correction (confirmed daily). Frame dragging (confirmed Gravity Probe B).',cross_force:'Riemannian geometry appears in ML, economics, info theory — math substrate is more universal than the physics seed.',untested:'Behavior at Planck scale. Quantum gravity regime.'},
    q7: {kill_1:'Self-refuting? No. The claim is consistent.',kill_2:'Regress? No. Chain terminates at equivalence principle (axiom).',kill_3:'Empirical contradiction? 3 survived (lensing, waves, GPS). 1 LIVE: singularity problem.',kill_4:'Logical incoherence? No internal contradictions found.',kill_5:'Explanatory failure? Partially — cannot explain singularities. Connected to Q5 hidden dependency.'},
  };
  Object.keys(gr).forEach(cardId => fillCard(cardId, gr[cardId]));
  // Set scores
  const scores = {q0:0.75,q1:0.88,q2:0.92,q3:0.90,q4:0.87,q5:0.65,q6:0.85,q7:0.82};
  Object.entries(scores).forEach(([id,s]) => {
    const el = document.querySelector(`[data-card="${id}"][data-field="score"]`);
    if(el) el.innerText = s.toFixed(2);
    const bar = document.querySelector(`.q-card[data-card-id="${id}"] .score-fill`);
    if(bar) bar.style.width = (s*100)+'%';
  });
  toast('GR example loaded across all 8 cards');
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderCards();
</script>
</body>
</html>
